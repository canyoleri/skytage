<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skytage</title>
  <style>
    body {
      width: 680px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      border-bottom: 2px solid #ddd;
    }
    .tab-btn {
      padding: 6px 16px;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      border-radius: 0;
    }
    .tab-btn.active {
      color: #222;
      font-weight: bold;
      border-bottom-color: #222;
    }
    .tab-btn:hover { color: #222; opacity: 1; background: none; }
    .panel        { display: none; }
    .panel.active { display: block; }
    /* Shared list */
    .url-list {
      max-height: 500px;
      overflow-y: auto;
    }
    /* By Site */
    .site-container {
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .site-header {
      padding: 10px;
      background: #f5f5f5;
      cursor: pointer;
      user-select: none;
    }
    .site-header:hover { background: #eee; }
    .header-content {
      display: flex;
      align-items: center;
    }
    .arrow {
      display: inline-block;
      margin-right: 10px;
      transition: transform 0.2s;
    }
    .arrow.expanded { transform: rotate(90deg); }
    .site-content {
      padding: 10px;
      border-top: 1px solid #ddd;
    }
    .timestamp {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
    .provider-section { margin: 10px 0; }
    .provider-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    .url-item {
      display: flex;
      align-items: center;
      gap: 6px;
      word-break: break-all;
      padding: 4px 5px 4px 15px;
      font-family: monospace;
      font-size: 13px;
      color: #444;
    }
    .url-number {
      min-width: 20px;
      color: #666;
      flex-shrink: 0;
    }
    .url-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Status badges */
    .status-badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
      font-family: Arial, sans-serif;
    }
    .status-public  { background: #fde8e8; color: #c0392b; }
    .status-private { background: #e8f8e8; color: #27ae60; }
    .status-unknown { background: #f0f0f0; color: #999;    }
    /* Buckets tab */
    .bucket-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .bucket-meta {
      font-size: 13px;
      color: #666;
    }
    .check-btn {
      padding: 6px 14px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .check-btn:hover    { opacity: 0.85; }
    .check-btn:disabled { background: #999; cursor: default; opacity: 1; }
    .bucket-container {
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .bucket-header {
      padding: 10px;
      background: #f5f5f5;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bucket-header:hover { background: #eee; }
    .bucket-name {
      font-family: monospace;
      font-size: 13px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .provider-badge {
      font-size: 11px;
      background: #e0e0e0;
      color: #555;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .cross-site-badge {
      font-size: 11px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .bucket-content {
      padding: 10px;
      border-top: 1px solid #ddd;
      display: none;
    }
    .bucket-site {
      font-family: monospace;
      font-size: 12px;
      color: #555;
      padding: 2px 0;
    }
    /* Buttons */
    .btn-group { display: flex; gap: 8px; }
    .clear-btn {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #dc3545;
      color: white;
    }
    .clear-btn:hover { opacity: 0.9; }
    .export-btn {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #28a745;
      color: white;
    }
    .export-btn:hover { opacity: 0.9; }
    /* Risk / finding badges */
    .status-takeover { background: #e84118; color: white; }
    .status-sensitive { background: #8e44ad; color: white; }
    .cname-badge {
      font-size: 11px;
      background: #d6eaf8;
      color: #1a5276;
      border: 1px solid #85c1e9;
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }
    /* Detail sections inside bucket content */
    .detail-section {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .detail-section.danger  { background: #fde8e8; border: 1px solid #f5c6cb; }
    .detail-section.warning { background: #fff3cd; border: 1px solid #ffc107; }
    .detail-section.info    { background: #d6eaf8; border: 1px solid #85c1e9; }
    .detail-section strong  { display: block; margin-bottom: 4px; }
    .detail-section .file-item,
    .detail-section .cname-item { font-family: monospace; padding: 1px 0; color: #333; }
    /* Timeline */
    .timeline { margin-top: 8px; }
    .timeline-item {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: #555;
      padding: 2px 0;
      border-left: 2px solid #ddd;
      padding-left: 8px;
      margin-bottom: 2px;
    }
    .timeline-item .tl-dot { font-weight: bold; }
    .timeline-item .tl-dot.public  { color: #c0392b; }
    .timeline-item .tl-dot.private { color: #27ae60; }
    .timeline-item .tl-dot.unknown { color: #999; }
    .timeline-item .tl-dot.takeover { color: #e84118; }
  </style>
</head>
<body>
  <div class="controls">
    <h2>Skytage</h2>
    <div class="btn-group">
      <button id="exportTxt"  class="export-btn">Export TXT</button>
      <button id="exportJson" class="export-btn">Export JSON</button>
      <button id="exportCsv"  class="export-btn">Export CSV</button>
      <button id="clearAll" class="clear-btn">Clear All Data</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="by-site">By Site</button>
    <button class="tab-btn" data-tab="buckets">Buckets</button>
  </div>

  <div id="by-site" class="panel active">
    <div id="urlList" class="url-list"></div>
  </div>

  <div id="buckets" class="panel">
    <div class="bucket-actions">
      <span id="bucketMeta" class="bucket-meta"></span>
      <button id="checkAll" class="check-btn">Check All</button>
    </div>
    <div id="bucketList" class="url-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
